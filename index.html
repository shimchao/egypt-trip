    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
            background: #f2f3f6;
            color: #1a1a1a;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: #fff;
            padding: calc(16px + env(safe-area-inset-top)) 16px 12px;
            text-align: center;
            z-index: 100;
        }
        .header h1 { font-size: 1.25em; color: #1a1a1a; letter-spacing: 1px; font-weight: 800; }
        .header .subtitle { font-size: 0.72em; color: #8e8e93; margin-top: 3px; }
        .clock-row {
            display: flex; justify-content: center; gap: 16px;
            margin-top: 8px; font-size: 0.7em; color: #8e8e93;
        }
        .clock-row span { display: flex; align-items: center; gap: 4px; }
        .clock-flag { font-size: 1.1em; }
        .progress-bar { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 0 4px; }
        .progress-track { flex: 1; height: 5px; background: #f2f3f6; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3182f6; border-radius: 3px; transition: width 0.3s; }
        .progress-text { font-size: 0.65em; color: #8e8e93; white-space: nowrap; }

        /* ── Quick buttons ── */
        .quick-btns {
            display: flex; gap: 6px; margin-top: 10px; justify-content: center; flex-wrap: wrap;
        }
        .qbtn {
            font-size: 0.68em; padding: 6px 12px; border-radius: 8px;
            border: none; background: #f2f3f6;
            color: #333; cursor: pointer; text-decoration: none; font-weight: 500;
        }
        .qbtn:active { background: #e5e6ea; opacity: 0.7; transform: scale(0.97); }
        .qbtn.active-qbtn { background: #e8f3ff; color: #3182f6; }

        /* ── Tab navigation ── */
        .tab-nav {
            display: flex; overflow-x: auto; background: #fff;
            padding: 8px 8px 0; gap: 2px; scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex-shrink: 0; padding: 10px 0 12px; border: none; background: transparent;
            color: #8e8e93; font-size: 0.8em; font-weight: 500;
            border-radius: 0; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 2px; width: 56px;
            border-bottom: 2px solid transparent; position: relative;
        }
        .tab-btn .tab-date { font-size: 0.8em; opacity: 0.7; }
        .tab-btn .tab-day { font-size: 1.05em; }
        .tab-btn .tab-region { font-size: 0.6em; opacity: 0.5; letter-spacing: 0.3px; }
        .tab-btn.active { color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #1a1a1a; }
        .tab-btn.active .tab-region { opacity: 1; color: #3182f6; }
        .tab-btn.today { border-top: 2px solid #3182f6; }

        /* ── Panel ── */
        .day-panel { display: none; padding: 16px; padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
        .day-panel.active { display: block; }

        .day-header {
            padding: 16px 20px; margin-bottom: 10px; border-radius: 16px;
            background: #fff; text-align: center;
        }
        .day-header .day-title { font-size: 1.1em; font-weight: 800; color: #1a1a1a; }
        .day-header .day-subtitle { font-size: 0.75em; color: #8e8e93; margin-top: 3px; }
        .day-header .day-region {
            display: inline-block; margin-top: 8px; padding: 3px 12px;
            background: #f2f3f6; border-radius: 8px;
            font-size: 0.65em; color: #8e8e93; letter-spacing: 1px; font-weight: 500;
        }

        /* ── Accommodation card ── */
        .accom-card {
            background: #fff;
            border: none; border-radius: 16px;
            padding: 16px 18px; margin-bottom: 10px;
        }
        .accom-label { font-size: 0.65em; color: #8e8e93; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
        .accom-name { font-size: 0.95em; font-weight: 700; color: #1a1a1a; }
        .accom-addr { font-size: 0.75em; color: #8e8e93; margin-top: 2px; }
        .accom-btns { display: flex; gap: 6px; margin-top: 10px; }

        /* ── Timeline ── */
        .timeline { position: relative; padding-left: 0; }
        .timeline::before { display: none; }
        .event {
            position: relative; margin-bottom: 10px; padding: 16px 18px;
            background: #fff; border-radius: 16px;
            border: none; transition: background 0.15s, transform 0.15s;
        }
        .event:active { background: #f2f3f6; }
        .event::before { display: none; }
        .event-time { font-size: 0.68em; font-weight: 500; color: #8e8e93; margin-bottom: 4px; letter-spacing: 0.5px; }
        .event-desc { font-size: 1em; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
        .event-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

        /* ── Badges ── */
        .badge {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 0.67em; font-weight: 600; padding: 4px 10px;
            border-radius: 8px; text-decoration: none; cursor: pointer;
            border: none;
        }
        .badge-done { background: #e8f3ff; color: #3182f6; }
        .badge-need { background: #fff0e0; color: #ff6b00; }
        .badge-wait { background: #f3e8ff; color: #8b5cf6; }
        .badge-think { background: #f2f3f6; color: #8e8e93; }
        a.badge:active { opacity: 0.7; }

        /* ── Location buttons ── */
        .location-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .loc-btn {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 0.68em; padding: 5px 10px; border-radius: 8px;
            border: 1px solid #e5e6ea; background: #fff;
            color: #3182f6; text-decoration: none; cursor: pointer;
            -webkit-user-select: none; user-select: none; font-weight: 500;
        }
        .loc-btn:active { background: #f2f3f6; }
        .loc-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

        /* ── Memo ── */
        .memo-section { margin-top: 10px; }
        .memo-label { font-size: 0.7em; color: #8e8e93; margin-bottom: 4px; }
        .memo-input {
            width: 100%; min-height: 60px; padding: 12px 14px;
            background: #fff; border: none;
            border-radius: 16px; color: #1a1a1a; font-size: 0.85em;
            font-family: inherit; resize: vertical; outline: none;
        }
        .memo-input:focus { box-shadow: 0 0 0 2px #3182f6; }
        .memo-saved { font-size: 0.6em; color: #3182f6; opacity: 0; transition: opacity 0.3s; margin-top: 3px; }
        .memo-saved.show { opacity: 1; }

        /* ── Info panel (overlay) ── */
        .info-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
            display: none; align-items: flex-end; justify-content: center;
        }
        .info-overlay.show { display: flex; }
        .info-sheet {
            background: #fff; border-radius: 16px 16px 0 0;
            width: 100%; max-width: 500px; max-height: 85vh;
            overflow-y: auto; padding: 20px 16px 30px;
        }
        .info-sheet h2 { font-size: 1.05em; color: #1a1a1a; font-weight: 800; margin-bottom: 14px; text-align: center; }
        .info-sheet .handle {
            width: 36px; height: 4px; background: #e5e6ea;
            border-radius: 2px; margin: 0 auto 14px;
        }
        .info-group { margin-bottom: 16px; }
        .info-group-title { font-size: 0.7em; color: #8e8e93; font-weight: 600; letter-spacing: 1px; margin-bottom: 6px; }
        .info-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f2f3f6;
            font-size: 0.82em;
        }
        .info-item .label { color: #8e8e93; }
        .info-item .value { color: #1a1a1a; font-weight: 600; text-align: right; }
        .info-item a { color: #3182f6; text-decoration: none; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 12px;
            font-size: 0.8em; z-index: 9999; opacity: 0; transition: all 0.3s;
            pointer-events: none; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .swipe-hint { text-align: center; font-size: 0.65em; color: #c7c7cc; padding: 16px 0 30px; }

        /* ── Image Modal ── */
        .img-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 300;
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .img-modal.show { display: flex; }
        .img-modal img {
            max-width: 100%; max-height: 85vh; border-radius: 16px;
        }
        .img-modal .close-btn {
            position: absolute; top: 16px; right: 16px;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            color: #fff; font-size: 1.2em; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .img-modal .modal-title {
            position: absolute; top: 16px; left: 16px;
            color: #fff; font-size: 0.8em; font-weight: 600;
        }
        .badge-booking {
            background: #e8f3ff; color: #3182f6;
            cursor: pointer;
        }
        .badge-booking:active { opacity: 0.7; }

        /* ── Distance between events ── */
        .distance-label {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; padding: 2px 0; margin: -4px 0 -4px 0;
            position: relative;
        }
        .distance-label::before { display: none; }
        .distance-text {
            font-size: 0.62em; color: #8e8e93; font-weight: 500;
            background: transparent; padding: 1px 8px; border-radius: 8px;
            letter-spacing: 0.3px;
        }

        /* ── Budget tracker ── */
        .budget-form { padding: 0 0 12px; border-bottom: 1px solid #f2f3f6; margin-bottom: 12px; }
        .budget-form label { font-size: 0.7em; color: #8e8e93; display: block; margin-bottom: 3px; margin-top: 8px; }

// ══════════════════════════════════════════════════════════════
// ── Firebase Sync Layer ──────────────────────────────────────
// ══════════════════════════════════════════════════════════════
//
// SETUP INSTRUCTIONS (3 steps):
// 1. Go to https://console.firebase.google.com → Create project "egypt-trip"
// 2. In project settings → General → scroll down → Add web app → copy config
// 3. Paste the config values below (apiKey, authDomain, databaseURL, projectId)
//    Then go to Realtime Database → Create database → Start in TEST mode
//
// ══════════════════════════════════════════════════════════════

const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCtRG9VBCeVaSSrEy_gr20iBhjXcG6jPA0",
    authDomain: "egypt-trip-20588.firebaseapp.com",
    databaseURL: "https://egypt-trip-20588-default-rtdb.firebaseio.com",
    projectId: "egypt-trip-20588",
    storageBucket: "egypt-trip-20588.firebasestorage.app",
    messagingSenderId: "74876152661",
    appId: "1:74876152661:web:0d20920f7533bc4fcc1ddc"
};

// ── Sync Module ──
const FireSync = (() => {
    let db = null;
    let isOnline = navigator.onLine;
    let listeners = {};
    let initialized = false;
    const DB_ROOT = 'egypt-trip';

    function updateIndicator(state) {
        const el = document.getElementById('syncStatus');
        if (!el) return;
        el.className = 'sync-indicator ' + state;
        el.textContent = state === 'synced' ? '동기화됨' : state === 'syncing' ? '동기화중...' : '오프라인';
        if (state === 'synced') {
            setTimeout(() => { el.style.opacity = '0.4'; }, 2000);
        } else {
            el.style.opacity = '1';
        }
    }

    function init() {
        if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
            console.warn('[FireSync] Firebase not configured. Using localStorage only.');
            updateIndicator('offline');
            return;
        }
        try {
            firebase.initializeApp(FIREBASE_CONFIG);
            db = firebase.database();

            // Enable offline persistence
            db.goOnline();

            // Connection state
            db.ref('.info/connected').on('value', snap => {
                isOnline = snap.val() === true;
                updateIndicator(isOnline ? 'synced' : 'offline');
            });

            initialized = true;
            console.log('[FireSync] Initialized');

            // Initial pull from Firebase to merge with localStorage
            pullAll();

            // Listen for remote changes
            listenForChanges();
        } catch(e) {
            console.error('[FireSync] Init failed:', e);
            updateIndicator('offline');
        }
    }

    function pullAll() {
        if (!db) return;
        updateIndicator('syncing');

        // Pull edit data
        db.ref(DB_ROOT + '/editData').once('value').then(snap => {
            const remote = snap.val();
            if (remote) {
                const local = JSON.parse(localStorage.getItem('egypt-edit-data') || '{}');
                const merged = mergeEditData(local, remote);
                localStorage.setItem('egypt-edit-data', JSON.stringify(merged));
                // Re-render all panels
                if (typeof DAYS !== 'undefined') {
                    DAYS.forEach((_, i) => {
                        if (typeof rebuildPanel === 'function') rebuildPanel(i);
                    });
                }
            }
        });

        // Pull budget
        db.ref(DB_ROOT + '/budget').once('value').then(snap => {
            const remote = snap.val();
            if (remote && Array.isArray(remote)) {
                const local = JSON.parse(localStorage.getItem('egypt-budget') || '[]');
                const merged = mergeBudget(local, remote);
                localStorage.setItem('egypt-budget', JSON.stringify(merged));
            }
        });

        // Pull memos
        db.ref(DB_ROOT + '/memos').once('value').then(snap => {
            const remote = snap.val();
            if (remote && typeof remote === 'object') {
                Object.keys(remote).forEach(key => {
                    const dayIdx = key.replace('day-', '');
                    const localMemo = localStorage.getItem('egypt-memo-' + dayIdx) || '';
                    // Use remote if local is empty, or remote is newer (use longer as heuristic)
                    if (!localMemo && remote[key]) {
                        localStorage.setItem('egypt-memo-' + dayIdx, remote[key]);
                        const el = document.getElementById('memo-' + dayIdx);
                        if (el) el.value = remote[key];
                    }
                });
            }
            updateIndicator('synced');
        });
    }

    function mergeEditData(local, remote) {
        // Merge by key — remote wins if local key doesn't exist, otherwise keep local
        // Both are objects like { "day-0": [...events], "day-3": [...events] }
        const merged = { ...remote };
        Object.keys(local).forEach(key => {
            // If both have the key, use the one with more events (more edits = more recent)
            if (merged[key] && local[key]) {
                // Keep whichever has been edited more recently (more items or different)
                merged[key] = local[key]; // Local wins on conflict (you just edited it)
            } else if (local[key]) {
                merged[key] = local[key];
            }
        });
        return merged;
    }

    function mergeBudget(local, remote) {
        // Merge by id — union of both lists
        const byId = {};
        remote.forEach(e => { byId[e.id] = e; });
        local.forEach(e => { byId[e.id] = e; }); // local wins on conflict
        return Object.values(byId).sort((a, b) => a.id - b.id);
    }

    function listenForChanges() {
        if (!db) return;

        // Listen for edit data changes
        db.ref(DB_ROOT + '/editData').on('value', snap => {
            const remote = snap.val();
            if (!remote) return;
            const local = JSON.parse(localStorage.getItem('egypt-edit-data') || '{}');
            const merged = mergeEditData(local, remote);
            localStorage.setItem('egypt-edit-data', JSON.stringify(merged));
            // Re-render visible panel
            if (typeof currentTab !== 'undefined' && typeof rebuildPanel === 'function') {
                rebuildPanel(currentTab);
            }
            updateIndicator('synced');
        });

        // Listen for budget changes
        db.ref(DB_ROOT + '/budget').on('value', snap => {
            const remote = snap.val();
            if (!remote) return;
            const local = JSON.parse(localStorage.getItem('egypt-budget') || '[]');
            const merged = mergeBudget(local, remote);
            localStorage.setItem('egypt-budget', JSON.stringify(merged));
            // If budget tab is active, refresh it
            if (typeof currentBottomTab !== 'undefined' && currentBottomTab === 'budget') {
                if (typeof renderBudgetPage === 'function') renderBudgetPage();
            }
            updateIndicator('synced');
        });

        // Listen for memo changes
        db.ref(DB_ROOT + '/memos').on('value', snap => {
            const remote = snap.val();
            if (!remote) return;
            Object.keys(remote).forEach(key => {
                const dayIdx = key.replace('day-', '');
                const el = document.getElementById('memo-' + dayIdx);
                // Only update if the element exists and is not currently focused (user is not typing)
                if (el && document.activeElement !== el) {
                    const localVal = localStorage.getItem('egypt-memo-' + dayIdx) || '';
                    if (remote[key] !== localVal) {
                        localStorage.setItem('egypt-memo-' + dayIdx, remote[key]);
                        el.value = remote[key];
                    }
                }
            });
            updateIndicator('synced');
        });
    }

    // Push functions — called after localStorage write
    function pushEditData(data) {
        if (!db) return;
        updateIndicator('syncing');
        db.ref(DB_ROOT + '/editData').set(data)
            .then(() => updateIndicator('synced'))
            .catch(() => updateIndicator('offline'));
    }

    function pushBudget(data) {
        if (!db) return;
        updateIndicator('syncing');
        db.ref(DB_ROOT + '/budget').set(data)
            .then(() => updateIndicator('synced'))
            .catch(() => updateIndicator('offline'));
    }

    function pushMemo(dayIdx, text) {
        if (!db) return;
        updateIndicator('syncing');
        db.ref(DB_ROOT + '/memos/day-' + dayIdx).set(text)
            .then(() => updateIndicator('synced'))
            .catch(() => updateIndicator('offline'));
    }

    return { init, pushEditData, pushBudget, pushMemo, pullAll };
})();

// ── Utility ──
function mapsUrl(lat, lng) { return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`; }

function copyAddr(addr) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(addr).then(() => toast('📋 주소 복사됨! 택시앱에 붙여넣기')).catch(() => fbCopy(addr));
    } else { fbCopy(addr); }
}
function fbCopy(t) {
    const ta = document.createElement('textarea'); ta.value = t;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('📋 주소 복사됨!');
}
function toast(msg) {
    const el = document.getElementById('toast'); el.textContent = msg;
    el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Clock ──
function updateClock() {
    const now = new Date();
    const kr = now.toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', hour12: false });
    const eg = now.toLocaleTimeString('ko-KR', { timeZone: 'Africa/Cairo', hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('clockKR').textContent = kr;
    document.getElementById('clockEG').textContent = eg;
}
setInterval(updateClock, 30000); updateClock();

// ── Tab logic ──
let currentTab = 0;
function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[idx].classList.add('active');
    document.getElementById('panel-' + idx).classList.add('active');
    currentTab = idx;
    document.querySelectorAll('.tab-btn')[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── Swipe ──
function enableSwipe() {
    let sx = 0;
    const p = document.getElementById('panels');
    p.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    p.addEventListener('touchend', e => {
        const d = sx - e.changedTouches[0].clientX;
        if (Math.abs(d) > 60) {
            if (d > 0 && currentTab < DAYS.length - 1) switchTab(currentTab + 1);
            else if (d < 0 && currentTab > 0) switchTab(currentTab - 1);
        }
    }, { passive: true });
}

// ── Memo (localStorage) ──
function saveMemo(dayIdx) {
    const val = document.getElementById('memo-' + dayIdx).value;
    localStorage.setItem('egypt-memo-' + dayIdx, val);
    FireSync.pushMemo(dayIdx, val);
    const s = document.getElementById('memo-saved-' + dayIdx);
    s.classList.add('show'); setTimeout(() => s.classList.remove('show'), 1500);
}
function loadMemo(dayIdx) {
    return localStorage.getItem('egypt-memo-' + dayIdx) || '';
}

// ── Determine today's tab ──
function getTodayIdx() {
    const today = new Date();
    const tripDates = DAYS.map(d => {
        const [m, dd] = d.date.split('/');
        return new Date(2026, parseInt(m) - 1, parseInt(dd));
    });
    for (let i = tripDates.length - 1; i >= 0; i--) {
        if (today >= tripDates[i]) return i;
    }
    return 0;
}

// ── Build accommodation card ──
let accomDetailOpen = {};
function toggleAccomDetail(key) {
    accomDetailOpen[key] = !accomDetailOpen[key];
    const el = document.getElementById('accom-detail-' + key);
    const btn = document.getElementById('accom-toggle-' + key);
    if (el) {
        el.style.display = accomDetailOpen[key] ? 'flex' : 'none';
        btn.textContent = accomDetailOpen[key] ? '세부정보 접기 ▲' : '세부정보 보기 ▼';
    }
}

function accomCard(key) {
    if (!key || !ACCOMS[key]) return '';
    const a = ACCOMS[key];
    let hasDetail = !!(a.info && (a.info.wifi || a.info.phone || a.info.video || a.info.jacuzzi || a.info.checkin));
    let infoHtml = '';
    if (hasDetail) {
        const isOpen = !!accomDetailOpen[key];
        infoHtml += `<div onclick="toggleAccomDetail('${key}')" id="accom-toggle-${key}" style="margin-top:8px;font-size:0.72em;color:#3182f6;cursor:pointer;text-align:center;padding:6px 0">${isOpen ? '세부정보 접기 ▲' : '세부정보 보기 ▼'}</div>`;
        infoHtml += `<div id="accom-detail-${key}" style="display:${isOpen ? 'flex' : 'none'};margin-top:8px;padding-top:10px;border-top:1px solid #f2f3f6;font-size:0.75em;color:#8e8e93;flex-direction:column;gap:5px">`;
        if (a.info.checkin) infoHtml += `<div>🕐 체크인: <span style="color:#1a1a1a;font-weight:600">${a.info.checkin}</span></div>`;
        if (a.info.wifi) infoHtml += `<div>📶 Wi-Fi: <span style="color:#1a1a1a;font-weight:600">${a.info.wifi}</span></div>`;
        if (a.info.phone) infoHtml += `<div>📞 연락처: <a href="tel:${a.info.phone.replace(/\s/g,'')}" style="color:#3182f6">${a.info.phone}</a></div>`;
        if (a.info.video) infoHtml += `<div>🎥 <a href="${a.info.video}" target="_blank" style="color:#3182f6">체크인 안내 영상</a></div>`;
        if (a.info.jacuzzi) infoHtml += `<div>🛁 자쿠지: ${a.info.jacuzzi}</div>`;
        infoHtml += `</div>`;

// ── Haversine distance (km) ──
function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getEventCoords(ev) {
    if (ev.loc && ev.loc.length && ev.loc[0].lat && ev.loc[0].lng) {
        return { lat: ev.loc[0].lat, lng: ev.loc[0].lng };
    }
    return null;
}

function distanceLabel(ev1, ev2) {
    const c1 = getEventCoords(ev1);
    const c2 = getEventCoords(ev2);
    if (!c1 || !c2) return '';
    const km = haversineKm(c1.lat, c1.lng, c2.lat, c2.lng);
    if (km < 0.05) return '';
    const display = km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
    return `<div class="distance-label"><span class="distance-text">↕ ${display}</span></div>`;
}

function buildRouteButton(events) {
    const coords = [];
    events.forEach(ev => {
        const c = getEventCoords(ev);
        if (c) coords.push(c);
    });
    if (coords.length < 2) return '';
    const waypoints = coords.map(c => `${c.lat},${c.lng}`).join('/');
    const url = `https://www.google.com/maps/dir/${waypoints}/`;
    return `<a href="${url}" target="_blank" style="display:inline-block;margin-top:8px;padding:5px 14px;background:#f2f3f6;border-radius:8px;color:#3182f6;font-size:0.7em;text-decoration:none;font-weight:500">🗺 동선 보기 (${coords.length}곳)</a>`;
}

// ── Edit mode (localStorage overrides) ──
const editModeState = {};

function getEditData() {
    try { return JSON.parse(localStorage.getItem('egypt-edit-data') || '{}'); } catch(e) { return {}; }
}
function saveEditData(data) {
    localStorage.setItem('egypt-edit-data', JSON.stringify(data));
    FireSync.pushEditData(data);
}

function getMergedEvents(dayIdx) {
    const data = getEditData();
    const key = 'day-' + dayIdx;
    if (data[key]) return data[key];
    return DAYS[dayIdx].events.map(ev => ({
        time: ev.time, desc: ev.desc, sub: ev.sub || '',
        status: ev.status, statusText: ev.statusText,
        link: ev.link, bookingImg: ev.bookingImg, bookingTitle: ev.bookingTitle,
        loc: ev.loc
    }));
}

function saveEventsForDay(dayIdx, events) {
    const data = getEditData();
    data['day-' + dayIdx] = events;
    saveEditData(data);
}

function toggleEditMode(dayIdx) {
    editModeState[dayIdx] = !editModeState[dayIdx];
    rebuildPanel(dayIdx);
}

function deleteEvent(dayIdx, evIdx) {
    const events = getMergedEvents(dayIdx);
    events.splice(evIdx, 1);
    saveEventsForDay(dayIdx, events);
    rebuildPanel(dayIdx);
    toast('일정 삭제됨');
}

function moveEvent(dayIdx, evIdx, direction) {
    const events = getMergedEvents(dayIdx);
    const newIdx = evIdx + direction;
    if (newIdx < 0 || newIdx >= events.length) return;
    const tmp = events[evIdx];
    events[evIdx] = events[newIdx];
    events[newIdx] = tmp;
    saveEventsForDay(dayIdx, events);
    rebuildPanel(dayIdx);
}

function addNewEvent(dayIdx) {
    const time = document.getElementById('new-time-' + dayIdx).value.trim();
    const desc = document.getElementById('new-desc-' + dayIdx).value.trim();
    const sub = document.getElementById('new-sub-' + dayIdx).value.trim();
    const mapUrl = document.getElementById('new-map-' + dayIdx).value.trim();
    const locName = document.getElementById('new-locname-' + dayIdx).value.trim();
    if (!time || !desc) { toast('시간과 내용을 입력하세요'); return; }
    const events = getMergedEvents(dayIdx);
    const newEv = { time: time, desc: desc, sub: sub };
    if (mapUrl) {
        newEv.loc = [{ name: locName || '지도', mapUrl: mapUrl, addr: locName || mapUrl }];
    }
    events.push(newEv);
    saveEventsForDay(dayIdx, events);
    rebuildPanel(dayIdx);
    toast('일정 추가됨');
}

function getEventCategoryIcon(desc) {

    if (/별/.test(d)) return { icon: '⭐', bg: '#e0f7fa' };
    if (/펠루카|범선|보트/.test(d)) return { icon: '⛵', bg: '#e0f7fa' };
    if (/투어|수영|비치|해변/.test(d)) return { icon: '🏄', bg: '#e0f7fa' };

function buildEventHtml(ev, dayIdx, evIdx, isEditing) {

        h += `</div>`;
    }

    if (ev.sub) h += `<div style="font-size:0.78em;color:#8e8e93;font-weight:400;margin-bottom:6px">${ev.sub}</div>`;
    if (ev.status || ev.bookingImg || ev.link) {
        h += `<div class="event-meta">`;
        if (ev.status) {
            if (ev.link) h += `<a href="${ev.link}" target="_blank" class="badge badge-${ev.status}">${ev.statusText}</a>`;
            else h += `<span class="badge badge-${ev.status}">${ev.statusText}</span>`;

        }

    const panel = document.getElementById('panel-' + dayIdx);

    let h = `

            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="day-subtitle">${day.date} (${day.dow})</div>

const CURRENCY_RATES = { KRW: 1, USD: 1380, EUR: 1500, EGP: 28 };
const BUDGET_CATEGORIES = ['이동비', '숙소비', '식비', '기념품', '선물', '기타'];
const BUDGET_CAT_ICONS = { '이동비': '🚕', '숙소비': '🏨', '식비': '🍽', '기념품': '🎁', '선물': '🎀', '기타': '📦' };

function getBudgetData() {
    try { return JSON.parse(localStorage.getItem('egypt-budget') || '[]'); } catch(e) { return []; }
}
function saveBudgetData(data) {
    localStorage.setItem('egypt-budget', JSON.stringify(data));
    FireSync.pushBudget(data);
}

function toKRW(amount, currency) {
    return Math.round(amount * (CURRENCY_RATES[currency] || 1));
}

function formatKRW(n) {
    return n.toLocaleString('ko-KR') + '원';
}

function addExpense() {
    const amount = parseFloat(document.getElementById('budget-amount').value);
    const currency = document.getElementById('budget-currency').value;
    const category = document.getElementById('budget-category').value;
    const memo = document.getElementById('budget-memo').value.trim();
    const date = document.getElementById('budget-date').value.trim();
    if (!amount || isNaN(amount)) { toast('금액을 입력하세요'); return; }
    if (!memo) { toast('내용을 입력하세요'); return; }
    const data = getBudgetData();
    data.push({ id: Date.now(), amount, currency, category, memo, date: date || '', krw: toKRW(amount, currency) });
    saveBudgetData(data);
    renderBudgetPage();
    toast('지출 추가됨');
}

function deleteExpense(id) {
    let data = getBudgetData();
    data = data.filter(e => e.id !== id);

    toast('지출 삭제됨');
}

    html += `<button class="qbtn" style="width:100%;padding:12px;margin-top:14px;font-size:0.85em" onclick="closeInfo()">닫기</button>`;

}

// ── D-day counter ──
function updateDday() {
    const departure = new Date(2026, 3, 6); // April 6, 2026
    const returnDate = new Date(2026, 3, 19); // April 19, 2026
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    const el = document.getElementById('ddayCounter');
    const sub = document.getElementById('ddaySub');
    if (!el) return;

    if (today < departure) {
        const diff = Math.ceil((departure - today) / (1000 * 60 * 60 * 24));
        el.textContent = `D-${diff}`;
        sub.textContent = `출발까지 ${diff}일`;
    } else if (today <= returnDate) {
        const tripDay = Math.floor((today - departure) / (1000 * 60 * 60 * 24)) + 1;
        el.textContent = `여행 ${tripDay}일차`;
        sub.textContent = `${14 - tripDay + 1}일 남음`;
    } else {
        el.textContent = '여행 완료';
        sub.textContent = '소중한 추억이 되었길';
    }
}

            if (!grouped[e.category]) grouped[e.category] = [];
            grouped[e.category].push(e);
        });

        BUDGET_CATEGORIES.forEach(cat => {
            const items = grouped[cat];
            if (!items || items.length === 0) return;
            html += `<div class="budget-cat-group">`;
            html += `<div class="budget-cat-title">${BUDGET_CAT_ICONS[cat]} ${cat}</div>`;
            items.forEach(e => {
                const amountStr = e.currency === 'KRW' ? formatKRW(e.amount) : `${e.amount.toLocaleString()} ${e.currency}`;
                const krwStr = e.currency !== 'KRW' ? ` <span class="budget-item-krw">(${formatKRW(e.krw)})</span>` : '';
                html += `<div class="budget-item">
                    <div class="budget-item-left">
                        <div class="budget-item-memo">${e.memo}</div>
                        <div class="budget-item-detail">${e.date || ''}</div>
                    </div>
                    <div class="budget-item-amount">${amountStr}${krwStr}</div>
                    <button class="budget-del-btn" onclick="deleteExpense(${e.id})">✕</button>
                </div>`;
            });
            html += `</div>`;
        });

        html += '<div class="budget-total-section">';
        let grandTotal = 0;
        BUDGET_CATEGORIES.forEach(cat => {
            const items = grouped[cat];
            if (!items || items.length === 0) return;
            const catTotal = items.reduce((s, e) => s + e.krw, 0);
            grandTotal += catTotal;
            html += `<div class="budget-total-row"><span class="cat-label">${BUDGET_CAT_ICONS[cat]} ${cat}</span><span class="cat-amount">${formatKRW(catTotal)}</span></div>`;
        });
        html += `<div class="budget-grand-total"><span>합계</span><span>${formatKRW(grandTotal)}</span></div>`;
        html += '</div>';
    }

    container.innerHTML = html;
}

const TTS_DATA = [];
let ttsVoicesLoaded = false;
function getTTSVoice(lang) {
    const voices = window.speechSynthesis.getVoices();
    // Try exact match first, then prefix match
    return voices.find(v => v.lang === lang)
        || voices.find(v => v.lang.startsWith(lang.split('-')[0]))
        || null;
}
// Preload voices (iOS loads them async)
if ('speechSynthesis' in window) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => { ttsVoicesLoaded = true; };
}

function speakById(id) {
    const d = TTS_DATA[id];
    if (!d) return;
    if (!('speechSynthesis' in window)) { toast('음성 미지원'); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(d.text);
    u.lang = d.lang;
    u.rate = 0.85;
    const voice = getTTSVoice(d.lang);
    if (voice) {
        u.voice = voice;
        window.speechSynthesis.speak(u);
        toast('🔊 ' + voice.name);
    } else {
        // Try speaking anyway
        window.speechSynthesis.speak(u);
        const availLangs = window.speechSynthesis.getVoices().map(v => v.lang).filter((v,i,a) => a.indexOf(v) === i).join(', ');
        toast('⚠️ ' + d.lang + ' 음성 없음. 설정 > 손쉬운사용 > 음성콘텐츠에서 추가');
    }
}

async function addCustomPhrase() {
    const ko = document.getElementById('newPhraseInput').value.trim();
    const lang = document.getElementById('newPhraseLang').value;
    const resultEl = document.getElementById('translateResult');
    if (!ko) { toast('표현을 입력하세요'); return; }
    const key = getGeminiKey();
    if (!key) { resultEl.textContent = 'API 키가 필요합니다.'; return; }
    resultEl.textContent = '🤔 번역 중...';

    const langName = lang === 'ar-EG' ? '이집트 아랍어(구어체/암미야)' : '중국어(보통화)';
    const prompt = '다음 한국어를 ' + langName + '로 번역해주세요. JSON으로만 답변: {"native":"현지어","roman":"한국어 발음 표기"}\n\n한국어: ' + ko;

    try {
        const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=' + key, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 4096 } })
        });
        const data = await resp.json();
        if (data.error) { resultEl.textContent = '⚠️ ' + data.error.message.split('.')[0]; return; }
        const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const jsonMatch = raw.match(/\{[\s\S]*?\}/);
        if (!jsonMatch) { resultEl.textContent = '⚠️ 번역 실패: ' + raw; return; }
        const parsed = JSON.parse(jsonMatch[0]);
        const phrases = getCustomPhrases();
        phrases.push({ ko: ko, native: parsed.native, roman: parsed.roman, lang: lang });
        localStorage.setItem('egypt-custom-phrases', JSON.stringify(phrases));
        document.getElementById('newPhraseInput').value = '';
        resultEl.textContent = '✅ 추가됨!';
        renderCustomPhrases();
        setTimeout(() => { resultEl.textContent = ''; }, 2000);
    } catch(e) {
        resultEl.textContent = '⚠️ 인터넷 연결 필요';
    }
}

async function askFreeQuestion() {
    const input = document.getElementById('freeQuestionInput');
    const result = document.getElementById('freeQuestionResult');
    const question = input.value.trim();
    if (!question) { toast('질문을 입력하세요'); return; }
    const key = getGeminiKey();
    if (!key) { result.textContent = 'API 키가 필요합니다. 다시 시도해주세요.'; return; }
    result.textContent = '🤔 생각 중...';

    // Build full trip context
    let allDaysText = '';
    DAYS.forEach((d, i) => {
        const evs = getMergedEvents(i);
        const evList = evs.map(e => `  ${e.time}: ${e.desc}${e.sub ? ' (' + e.sub + ')' : ''}`).join('\n');
        allDaysText += `D${d.day} ${d.date}(${d.dow}) ${d.region}:\n${evList}\n`;
    });

    const prompt = `[지시] 한국어로 간결하게 답변.

여행 정보:
- 경로: 인천→상하이→카이로→시와→후루가다→룩소르→카이로→인천
- 기간: 04/06~04/19 (14일)
- 지역: 상하이, 카이로, 시와 오아시스, 후루가다, 룩소르

전체 일정:
${allDaysText}

질문: ${question}`;

    await callGemini(prompt, result, 0);
}

function init() {
    // Initialize Firebase sync
    FireSync.init();

    // D-day counter
    updateDday();

    const nav = document.getElementById('tabNav');
    const panels = document.getElementById('panels');
    const todayIdx = getTodayIdx();

    DAYS.forEach((day, i) => {
        // Tab
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === todayIdx ? ' active today' : '');
        const regionShort = day.region.split(' ')[0].slice(0, 5);
        const dowColor = day.dow === '토' ? 'color:#3182f6' : day.dow === '일' ? 'color:#e53935' : '';
        btn.innerHTML = `<span class="tab-date" style="${dowColor}">${day.date.split('/')[1]}</span><span class="tab-day" style="${dowColor}">D${day.day}</span><span class="tab-region">${regionShort}</span>`;
        btn.onclick = () => switchTab(i);
        nav.appendChild(btn);

        // Panel
        const panel = document.createElement('div');
        panel.className = 'day-panel' + (i === todayIdx ? ' active' : '');
        panel.id = 'panel-' + i;
        panels.appendChild(panel);

        // Build panel content using shared function
        rebuildPanel(i);
    });

    currentTab = todayIdx;
    // enableSwipe(); // 스와이프 비활성화 — 날짜탭 클릭으로 이동
    setTimeout(() => {
        document.querySelectorAll('.tab-btn')[todayIdx].scrollIntoView({ block: 'nearest', inline: 'center' });
    }, 100);
}

// ── Progress ──
function updateProgress() {
    let done = 0, total = 0;
    DAYS.forEach(d => d.events.forEach(e => { if (e.status) { total++; if (e.status === 'done') done++; } }));
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${done}/${total} 예약완료 (${pct}%)`;
}

function openGoogleLens() {
    // Try deep links in order, fallback to web
    const schemes = ['google://lens', 'googlelens://', 'comgooglelens://'];
    let idx = 0;
    function tryNext() {
        if (idx < schemes.length) {
            const w = window.open(schemes[idx], '_blank');
            // If it didn't open (stays on same page), try next after brief delay
            idx++;
            setTimeout(() => {
                // If we're still here, previous scheme didn't work
                if (document.hasFocus()) tryNext();
            }, 500);
        } else {
            // All schemes failed, open web version
            window.location.href = 'https://lens.google.com';
        }
    }
    // First try the most common iOS scheme
    window.location.href = 'google://lens';
    // If still here after 1s, try web
    setTimeout(() => {
        if (document.hasFocus()) window.open('https://lens.google.com', '_blank');
    }, 1200);
}

    const key = getGeminiKey();
    if (!key) { result.textContent = 'API 키가 필요합니다. 다시 시도해주세요.'; return; }
    result.textContent = '🤔 생각 중...';

    const dayIdx = parseInt(document.getElementById('aiDay').value);
    const day = DAYS[dayIdx];
    const events = getMergedEvents(dayIdx);
    const evList = events.map(e => `${e.time}: ${e.desc}${e.sub ? ' (' + e.sub + ')' : ''}`).join('\n');

    // 다른 날 일정도 수집 (중복 추천 방지)
    let otherDays = '';
    DAYS.forEach((d, i) => {
        if (i !== dayIdx) {
            const evs = getMergedEvents(i);
            const places = evs.map(e => e.desc).join(', ');
            if (places) otherDays += `${d.date}: ${places}\n`;
        }
    });

    const startH = document.getElementById('aiTimeStart').value;
    const endH = document.getElementById('aiTimeEnd').value;
    const timeInput = startH + '시~' + endH + '시';
    const extraInput = document.getElementById('aiExtra').value.trim();
    const moodText = aiMood || '자유';
    const moodGuide = {
        '휴식': '카페, 공원, 전망 좋은 곳, 마사지, 느긋한 산책 위주로 추천',
        '활동': '체험, 투어, 수상스포츠, 사막투어 등 활동적인 것 위주로 추천',
        '관광': '유적지, 박물관, 시장, 전망대, 사진 포인트 위주로 추천',
        '맛집': '현지 맛집, 카페, 디저트, 길거리 음식 위주로 추천. 가게명+메뉴+가격대 필수',
        '자유': '상황에 맞게 자유롭게 추천'
    };

    const prompt = `[지시] 인사말/서론/마무리 절대 없이 바로 답변. 번호 매겨서.

여행지: ${day.region}
날짜: ${day.date}(${day.dow})
요청 시간대: ${timeInput}
원하는 활동: ${moodText}

오늘 전체 일정:
${evList}

다른 날 이미 예정된 일정 (절대 중복 추천 금지):
${otherDays}

${moodGuide[moodText] || moodGuide['자유']}

⚠️ 위 "다른 날 일정"에 이미 포함된 장소는 절대 추천하지 마세요.
오늘 일정과 겹치지 않는, 이 지역에서 갈 수 있는 새로운 곳만 추천하세요.

추천 3개를 아래 형식으로:
1. [장소명] - 한줄 설명 (현재 위치에서 이동시간 포함)
2. [장소명] - 한줄 설명
3. [장소명] - 한줄 설명

+ 꿀팁 1개 (이 지역/시간대에 실용적인 것)${extraInput ? '\n\n⚠️ 가장 중요: 아래 추가 요청을 최우선으로 반영하여 추천하세요.\n추가 요청: ' + extraInput : ''}`;

    await callGemini(prompt, result, 0);
}

async function callGemini(prompt, resultEl, retry) {
    try {
        const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=' + getGeminiKey(), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 4096 }
            })
        });

        // 429 TooManyRequests → 1회만 재시도 (60초 대기)
        if (resp.status === 429 && retry < 1) {
            resultEl.textContent = '⏳ 요청 제한... 60초 후 재시도';
            await new Promise(r => setTimeout(r, 60000));
            return callGemini(prompt, resultEl, retry + 1);
        }
        if (resp.status === 429) {
            resultEl.textContent = '⚠️ 요청 제한 초과. 1분 후 다시 시도해주세요.';
            return;
        }

        // 403/leaked → 백업 키 시도, 그래도 실패하면 키 재입력
        if (resp.status === 403 && retry === 0) {
            const bk = getBackupKey();
            if (bk && getGeminiKey() !== bk) {
                localStorage.setItem('egypt-gemini-key', bk);
                resultEl.textContent = '🔄 백업 키로 재시도...';
                return callGemini(prompt, resultEl, 1);
            }
            localStorage.removeItem('egypt-gemini-key');
            resultEl.textContent = '⚠️ API 키가 비활성화됨. 다시 시도하면 새 키를 입력할 수 있습니다.';
            return;
        }
        if (resp.status === 403) {
            localStorage.removeItem('egypt-gemini-key');
            resultEl.textContent = '⚠️ API 키가 비활성화됨. 다시 시도해주세요.';
            return;
        }

        const data = await resp.json();
        if (data.error) {
            resultEl.textContent = '⚠️ ' + data.error.message.split('.')[0];
            return;
        }
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        resultEl.textContent = text || '응답을 받지 못했습니다.';
    } catch(e) {
        resultEl.textContent = '⚠️ 인터넷 연결이 필요합니다.';
    }
}

init();


</script>
